type Query {
  getHikingTrailByDifficulty(difficulty: DificultyRanking!): [HikingTrail!]
  getHikingTrailsByRating(rating: Int!): [HikingTrail!]
  getClimbsByHikingTrail(trailName: String!): [ClimbingRoute]
  getHikingTrailByName(trailName: String!): HikingTrail
  getPeopleByClimb(routeName: String!): [Person]
  getPersonById(id: String!): Person
  getClimbingRouteByName(routeName: String!): ClimbingRoute
}

type Person {
  id: String!
  name: String!
  age: Int!
  job: String
  favouriteRoute: ClimbingRoute
}

enum DificultyRanking {
  BEGINNER
  INTERMEDIATE
  HARD
  EXPERT
}

type HikingTrail {
  trailName: String!
  distance: Float!
  elevation: Float!
  difficulty: DificultyRanking!
  parking: Boolean
  rating: Int
  climbingRoutes: [ClimbingRoute]
  allClimbsonTrailDiff: [VScale]!
}

enum VScale {
  V1
  V2
  V3
  V4
  V5
  V6
  V7
  V8
  V9
  V10
}

type ClimbingRoute {
  routeName: String!
  difficulty: VScale!
  fontDifficulty: String!
  completedBy: [Person!]!
  alongTrail: String!
}
